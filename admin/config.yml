backend:
  name: git-gateway
  branch: main # Change to 'master' if your main GitHub branch is named master

media_folder: "images" # Uploaded imagery will go into an images/ folder automatically
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Posts / Announcements"
    folder: "blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Body Content", name: "body", widget: "markdown" }

  - name: "homepage"
    label: "Homepage Controls"
    files:
      - file: "index.html"
        label: "Main Landing UI"
        name: "landing"
        fields:
          - { label: "Savage Precision Haircut Rate", name: "haircut_price", widget: "string", default: "₹499" }
          - { label: "Architectural Beard Sculpting Rate", name: "beard_price", widget: "string", default: "₹299" }
          - { label: "The Savage Combo Rate", name: "combo_price", widget: "string", default: "₹699" }
          - { label: "Root Conditioning Rate", name: "conditioning_price", widget: "string", default: "₹449" }
          - { label: "Client Testimonial Quote", name: "review_text", widget: "text" }
          - { label: "Opening Hours Text", name: "opening_hours", widget: "string", default: "Mon - Sat: 9:00 AM - 8:00 PM // Sun: Closed" }
